<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJDS Local Explorer | Real-Time Guide</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running the app in-browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Icon wrapper since we are using the CDN version of Lucide
        const Icon = ({ name, className = "w-4 h-4" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [selectedId, setSelectedId] = useState(1);
            const [filter, setFilter] = useState('all');

            const locations = [
                {
                    id: 1,
                    name: "Playa Hermosa",
                    category: "beaches",
                    query: "Playa+Hermosa+San+Juan+del+Sur+Nicaragua",
                    tags: ["Survivor Site", "Pristine"],
                    description: "A sprawling beach accessed through a private ranch. Known for its wide shore and consistent surf. It's much cleaner than the town beach.",
                    intel: "Entrance fee is $3. Facilities include a restaurant, showers, and hammocks. Famous as a repeat filming location for the 'Survivor' TV show.",
                    tips: ["Entrance fee: $3 per person", "Showers and restaurant on-site", "Filmed Survivor here 3+ times"],
                    icon: "waves"
                },
                {
                    id: 2,
                    name: "Playa Yankee",
                    category: "beaches",
                    query: "Playa+Yankee+Nicaragua",
                    tags: ["Pro Surf", "Rugged"],
                    description: "A wild, south-facing beach with a powerful wedge break. This is a local favorite for serious surfers looking to escape the crowds.",
                    intel: "4WD is mandatory. No facilities here—bring your own water and food. The volcanic sand and cliffs make for epic sunset views.",
                    tips: ["4WD Mandatory", "No facilities; pack water", "Best surf at mid-to-high tide"],
                    icon: "waves"
                },
                {
                    id: 3,
                    name: "La Flor Reserve",
                    category: "activities",
                    query: "Refugio+de+Vida+Silvestre+La+Flor+Nicaragua",
                    tags: ["Nature", "Turtles"],
                    description: "Critical nesting ground for Olive Ridley turtles. During 'Arribadas', thousands arrive at once.",
                    intel: "Peak nesting July-Jan. Night tours required. Red-light filters only. 45-min drive south from SJDS.",
                    tips: ["Peak: Oct-Nov", "Authorized guides only", "Strictly no white lights"],
                    icon: "tree-pine"
                },
                {
                    id: 4,
                    name: "Tree Casa Resort",
                    category: "activities",
                    query: "Tree+Casa+Resort+San+Juan+del+Sur",
                    tags: ["Jungle Pools", "Design"],
                    description: "Luxury eco-resort in the canopy. Features tiered pools and a slide into a natural pond.",
                    intel: "Day passes available ($20-$30). Sunday afternoons feature live music and a farmers-market vibe.",
                    tips: ["Day Pass: $20-30", "Slide into natural pond", "Sunday live music"],
                    icon: "tree-pine"
                },
                {
                    id: 5,
                    name: "Playa Escamequita",
                    category: "beaches",
                    query: "Playa+Escamequita+Nicaragua",
                    tags: ["Horseback", "River Mouth"],
                    description: "Peaceful cove where the river meets the sea. Prime spot for horseback riding tours.",
                    intel: "Best experience is a sunset ride with Big Sky Ranch. The beach itself is extremely quiet.",
                    tips: ["Big Sky Ranch is top-tier", "Beautiful birdwatching", "Very quiet/isolated"],
                    icon: "waves"
                },
                {
                    id: 6,
                    name: "Morgan's Rock",
                    category: "dining",
                    query: "Morgan's+Rock+Eco-Lodge+Nicaragua",
                    tags: ["Luxury", "Farm-to-Table"],
                    description: "Premier eco-lodge with a restaurant on a deck suspended above the jungle floor.",
                    intel: "Reservations required for non-guests. Incredible sunset views over a private beach.",
                    tips: ["Book 24h in advance", "70% of food grown on site", "Suspension bridge access"],
                    icon: "utensils"
                }
            ];

            const filteredLocations = filter === 'all' ? locations : locations.filter(l => l.category === filter);
            const activeLocation = locations.find(l => l.id === selectedId);

            return (
                <div className="flex flex-col h-screen text-zinc-100 overflow-hidden">
                    <header className="p-4 bg-zinc-900 border-b border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-orange-600 rounded-lg">
                                <Icon name="compass" className="w-6 h-6 text-white" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black uppercase italic leading-none">SJDS Live Explorer</h1>
                                <p className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-1">Real-Time Travel Guide</p>
                            </div>
                        </div>
                        <nav className="flex gap-2">
                            {['all', 'beaches', 'activities', 'dining'].map((cat) => (
                                <button
                                    key={cat}
                                    onClick={() => setFilter(cat)}
                                    className={`px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all ${
                                        filter === cat ? 'bg-zinc-100 text-zinc-950' : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
                                    }`}
                                >
                                    {cat}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <div className="flex flex-1 overflow-hidden flex-col lg:flex-row">
                        <div className="w-full lg:w-96 border-r border-zinc-800 bg-zinc-950 flex flex-col">
                            <div className="p-4 border-b border-zinc-800 flex items-center justify-between">
                                <span className="text-xs font-bold text-zinc-500 uppercase tracking-widest">Select Location</span>
                            </div>
                            <div className="flex-1 overflow-y-auto no-scrollbar p-2 space-y-2">
                                {filteredLocations.map((loc) => (
                                    <button
                                        key={loc.id}
                                        onClick={() => setSelectedId(loc.id)}
                                        className={`w-full text-left p-4 rounded-2xl transition-all border flex flex-col gap-2 ${
                                            selectedId === loc.id 
                                            ? 'bg-zinc-100 text-zinc-950 border-white shadow-xl' 
                                            : 'bg-zinc-900 text-zinc-400 border-zinc-800 hover:border-zinc-600'
                                        }`}
                                    >
                                        <div className="flex justify-between items-start">
                                            <span className="font-black uppercase italic tracking-tight text-lg leading-none">{loc.name}</span>
                                            <Icon name={loc.icon} />
                                        </div>
                                        <div className="flex flex-wrap gap-1">
                                            {loc.tags.map(tag => (
                                                <span key={tag} className={`text-[8px] font-bold px-2 py-0.5 rounded uppercase ${selectedId === loc.id ? 'bg-zinc-950 text-white' : 'bg-zinc-800 text-zinc-500'}`}>
                                                    {tag}
                                                </span>
                                            ))}
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="flex-1 flex flex-col bg-zinc-900 overflow-y-auto">
                            {activeLocation && (
                                <>
                                    <div className="relative h-96 lg:h-[500px] w-full bg-black shrink-0">
                                        <iframe
                                            title="Map"
                                            width="100%"
                                            height="100%"
                                            style={{ border: 0 }}
                                            src={`https://www.google.com/maps?q=${activeLocation.query}&output=embed&t=k`}
                                            allowFullScreen
                                        ></iframe>
                                        <div className="absolute bottom-4 left-4">
                                            <a 
                                                href={`https://www.google.com/maps/search/${activeLocation.query}`} 
                                                target="_blank" 
                                                className="bg-white text-black px-6 py-3 rounded-full text-xs font-black uppercase flex items-center gap-2 shadow-2xl"
                                            >
                                                View Live Photos <Icon name="external-link" className="w-3 h-3" />
                                            </a>
                                        </div>
                                    </div>

                                    <div className="p-8 md:p-12 max-w-4xl mx-auto w-full">
                                        <h2 className="text-4xl md:text-7xl font-black uppercase italic tracking-tighter mb-6">{activeLocation.name}</h2>
                                        <p className="text-xl text-zinc-400 mb-8 leading-relaxed italic">{activeLocation.description}</p>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                            <div className="space-y-4">
                                                <h4 className="text-xs font-black uppercase tracking-[0.2em] text-orange-500">Insider Intel</h4>
                                                <p className="text-zinc-300 text-sm leading-relaxed p-6 bg-zinc-800 rounded-3xl border border-white/5">{activeLocation.intel}</p>
                                            </div>
                                            <div className="space-y-3">
                                                <h4 className="text-xs font-black uppercase tracking-[0.2em] text-zinc-500">Pro Tips</h4>
                                                {activeLocation.tips.map((tip, i) => (
                                                    <div key={i} className="flex items-center gap-3 p-4 bg-zinc-950/50 rounded-2xl border border-zinc-800">
                                                        <Icon name="chevron-right" className="text-orange-600" />
                                                        <span className="text-sm text-zinc-300 font-medium">{tip}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
